# XcodeGen project specification for Roam.
#
# Generate the Xcode project with:   xcodegen generate
# (A pre-generated Roam.xcodeproj is also committed so you can open the
#  project without installing XcodeGen.)
#
# No third-party packages, no Swift Package dependencies — everything is local.
name: Roam
options:
  bundleIdPrefix: com.localfirst
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Roam:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Roam
        excludes:
          - "Resources/Info.plist"
          # StoreKit testing config is referenced by the scheme, not bundled.
          - "Resources/Roam.storekit"
      # Bundle the ZCTA data as a folder reference so subdirectory lookups work.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localfirst.roam
        INFOPLIST_FILE: Roam/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # iPhone-only until iPad layouts are verified.
        TARGETED_DEVICE_FAMILY: "1"
        # Link the system SQLite library (no third-party packages).
        OTHER_LDFLAGS: "-lsqlite3"
    info:
      path: Roam/Resources/Info.plist

  RoamTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
      # The sample DB must also be in the test bundle for ZCTAIndexTests.
      - path: Roam/Resources/ZCTA/zcta_sample.sqlite
        buildPhase: resources
    dependencies:
      - target: Roam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localfirst.roamTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Roam:
    build:
      targets:
        Roam: all
        RoamTests: [test]
    run:
      # Local StoreKit testing config so Roam Plus can be exercised in the
      # Simulator without App Store Connect products.
      storeKitConfiguration: Roam/Resources/Roam.storekit
    test:
      targets:
        - RoamTests
      gatherCoverageData: true
